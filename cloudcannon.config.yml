_schema: _schema
paths:
  uploads: src/assets/uploads
  static:
collections_config:
  src_content_episodes:
    path: src/content/episodes
    name: Episodes
    icon: content_paste
    disable_url: false
    description: This is where episodes are managed.
    _enabled_editors:
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  pages:
    path: ""
    name: Pages
    icon: wysiwyg
    disable_url: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
timezone: America/Chicago
markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: true
    code_block_fences: "```"
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    attributes: false
_snippets:
  premium_content:
    template: mdx_paired_component
    inline: false
    preview:
      text: Premium Content
    definitions:
      component_name: PremiumContent
      content_key: children
      named_args:
        - editor_key: fallback
          type: string
          optional: true
    _inputs:
      fallback:
        type: text
        label: Fallback Message
        description: Optional message to show to non-premium users
