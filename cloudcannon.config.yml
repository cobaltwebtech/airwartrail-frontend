_schema: _schema
paths:
  uploads: public/uploads
  uploads_use_relative_path: false
  static: public/
collections_config:
  episodes:
    path: src/content/episodes
    name: Episodes
    icon: ondemand_video
    disable_url: false
    description: This is where episodes are managed.
    preview:
      text:
      subtext:
      icon:
      icon_color:
      image:
      metadata:
      gallery:
    _enabled_editors:
      - content
      - visual
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: cloudcannon/schemas/episode.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: true
        name: New Episode
        icon: notes
        _enabled_editors:
          - content
          - visual
          - data
        create:
          path: "[relative_base_path]/{title|slugify}.mdx"
          extra_data:
          publish_to:
          _inputs:
          _select_data:
          _structures:
  pages:
    path: src/pages
    name: Pages
    icon: wysiwyg
    disable_url: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
_snippets_imports:
  mdx: true
_snippets:
  premium_video:
    template: mdx_component
    inline: false
    preview:
      text: Premium Video
    definitions:
      component_name: PremiumVideo
      named_args:
        - editor_key: videoUrl
          type: string
        - editor_key: videoTitle
          type: string
    _inputs:
      videoUrl:
        type: url
        label: Video URL
        cascade: true
  free_video:
    template: mdx_component
    inline: false
    preview:
      text: Free Video (Not YouTube)
    definitions:
      component_name: FreeVideo
      named_args:
        - editor_key: videoUrl
          type: string
        - editor_key: videoTitle
          type: string
    _inputs:
      videoUrl:
        type: url
        label: Video URL
        cascade: true
  ytEveryone_video:
    template: mdx_component
    inline: false
    preview:
      text: YouTube Everyone
    definitions:
      component_name: YtVideoEveryone
      named_args:
        - editor_key: ytShareUrl
          type: string
        - editor_key: videoTitle
          type: string
    _inputs:
      ytShareUrl:
        type: url
        label: YouTube Video URL
        cascade: true
  ytFree_video:
    template: mdx_component
    inline: false
    preview:
      text: YouTube Basic User
    definitions:
      component_name: YtFreeVideo
      named_args:
        - editor_key: ytShareUrl
          type: string
        - editor_key: videoTitle
          type: string
    _inputs:
      ytShareUrl:
        type: url
        label: YouTube Video URL
        cascade: true
  premium_download:
    template: mdx_component
    inline: false
    preview:
      text: Premium Download
    definitions:
      component_name: PremiumDownload
      named_args:
        - editor_key: downloadUrl
          type: string
    _inputs:
      downloadUrl:
        type: url
        label: Content URL
        cascade: true
source_editor:
  tab_size: 2
  theme: monokai
  show_gutter: true
timezone: America/Chicago
markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: true
    code_block_fences: "```"
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: true
    subscript: true
    superscript: true
    heading_ids: false
    attributes: false
